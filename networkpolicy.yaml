apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-ingress-policy
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kafka
  policyTypes:
    - Ingress
  ingress:
    # KRaft controller quorum and broker replication traffic.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
    # Banking services use the kafka:9092 bootstrap endpoint.
    - from:
        - namespaceSelector:
            matchLabels:
              name: banking
      ports:
        - protocol: TCP
          port: 9092
