apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: ingress-nginx
  namespace: ingress-nginx

rules:

- apiGroups:
    - ""

  resources:
    - configmaps
    - pods
    - secrets

  verbs:
    - get
    - list
    - watch

- apiGroups:
    - ""

  resources:
    - configmaps

  resourceNames:
    - ingress-controller-leader

  verbs:
    - get
    - update
    - create

- apiGroups:
    - ""

  resources:
    - events

  verbs:
    - create
    - patch

- apiGroups:
    - coordination.k8s.io

  resources:
    - leases

  verbs:
    - create
    - get
    - update
    