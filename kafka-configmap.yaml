apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-server-config
  namespace: banking
data:
  controller.properties: |
    process.roles=controller
    node.id=__NODE_ID__
    controller.quorum.voters=100@kafka-controller-0.kafka-controller-headless.banking.svc.cluster.local:9093,101@kafka-controller-1.kafka-controller-headless.banking.svc.cluster.local:9093,102@kafka-controller-2.kafka-controller-headless.banking.svc.cluster.local:9093
    controller.listener.names=CONTROLLER
    listeners=CONTROLLER://:9093
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
    inter.broker.listener.name=INTERNAL
    log.dirs=/var/lib/kafka/data
    metadata.log.dir=/var/lib/kafka/data
    auto.create.topics.enable=false
    num.partitions=6
    default.replication.factor=3
    min.insync.replicas=2
    offsets.topic.replication.factor=3
    transaction.state.log.replication.factor=3
    transaction.state.log.min.isr=2
    group.initial.rebalance.delay.ms=0
    unclean.leader.election.enable=false

  broker.properties: |
    process.roles=broker
    node.id=__NODE_ID__
    controller.quorum.voters=100@kafka-controller-0.kafka-controller-headless.banking.svc.cluster.local:9093,101@kafka-controller-1.kafka-controller-headless.banking.svc.cluster.local:9093,102@kafka-controller-2.kafka-controller-headless.banking.svc.cluster.local:9093
    controller.listener.names=CONTROLLER
    listeners=INTERNAL://:9092
    advertised.listeners=INTERNAL://__POD_NAME__.kafka-broker-headless.banking.svc.cluster.local:9092
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
    inter.broker.listener.name=INTERNAL
    log.dirs=/var/lib/kafka/data
    metadata.log.dir=/var/lib/kafka/data
    auto.create.topics.enable=false
    num.partitions=6
    default.replication.factor=3
    min.insync.replicas=2
    offsets.topic.replication.factor=3
    transaction.state.log.replication.factor=3
    transaction.state.log.min.isr=2
    log.retention.hours=168
    log.segment.bytes=1073741824
    message.max.bytes=10485760
    unclean.leader.election.enable=false
