    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboard
  ports:
    - name: web
      port: 3000
      targetPort: web
      protocol: TCP
