apiVersion: v1
kind: Service

metadata:
  name: payment-service
  namespace: banking

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"

  labels:
    app: payment-service

spec:

  selector:
    app: payment-service

  ports:

    - name: http

      port: 80

      targetPort: 8080

      protocol: TCP

  type: ClusterIP
  
