apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: banking
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
  ports:
    - name: kafka
      port: 9092
      targetPort: internal
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-broker-headless
  namespace: banking
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
  ports:
    - name: internal
      port: 9092
      targetPort: internal
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-controller-headless
  namespace: banking
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: controller
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: controller
  ports:
    - name: controller
      port: 9093
      targetPort: controller
      protocol: TCP
