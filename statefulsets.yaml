apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-controller
  namespace: banking
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: controller
spec:
  serviceName: kafka-controller-headless
  replicas: 3
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: controller
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: format-kraft-storage
          image: apache/kafka:4.1.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
            - |
              ordinal="${HOSTNAME##*-}"
              node_id="$((100 + ordinal))"
              cp /templates/controller.properties /config/server.properties
              sed -i "s/__NODE_ID__/${node_id}/g" /config/server.properties
              /opt/kafka/bin/kafka-storage.sh format --ignore-formatted \
                -t "${KAFKA_CLUSTER_ID}" \
                -c /config/server.properties
          env:
            - name: KAFKA_CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-kraft-config
                  key: KAFKA_CLUSTER_ID
            - name: LOG_DIR
              value: /tmp/kafka-logs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config-template
              mountPath: /templates
              readOnly: true
            - name: kafka-config
              mountPath: /config
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: tmp
              mountPath: /tmp
      containers:
        - name: kafka-controller
          image: apache/kafka:4.1.1
          imagePullPolicy: IfNotPresent
          command: ["/opt/kafka/bin/kafka-server-start.sh"]
          args: ["/config/server.properties"]
          ports:
            - name: controller
              containerPort: 9093
              protocol: TCP
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xms1g -Xmx1g"
            - name: LOG_DIR
              value: /tmp/kafka-logs
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          startupProbe:
            tcpSocket:
              port: controller
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: controller
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: controller
            initialDelaySeconds: 30
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["/bin/bash", "-ec", "sleep 30"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: kafka-config
              mountPath: /config
              readOnly: true
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-template
          configMap:
            name: kafka-server-config
        - name: kafka-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kafka
                    app.kubernetes.io/component: controller
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-broker
  namespace: banking
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: broker
spec:
  serviceName: kafka-broker-headless
  replicas: 3
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/component: broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: broker
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: format-kraft-storage
          image: apache/kafka:4.1.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
            - |
              ordinal="${HOSTNAME##*-}"
              cp /templates/broker.properties /config/server.properties
              sed -i "s/__NODE_ID__/${ordinal}/g" /config/server.properties
              sed -i "s/__POD_NAME__/${HOSTNAME}/g" /config/server.properties
              /opt/kafka/bin/kafka-storage.sh format --ignore-formatted \
                -t "${KAFKA_CLUSTER_ID}" \
                -c /config/server.properties
          env:
            - name: KAFKA_CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: kafka-kraft-config
                  key: KAFKA_CLUSTER_ID
            - name: LOG_DIR
              value: /tmp/kafka-logs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config-template
              mountPath: /templates
              readOnly: true
            - name: kafka-config
              mountPath: /config
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: tmp
              mountPath: /tmp
      containers:
        - name: kafka-broker
          image: apache/kafka:4.1.1
          imagePullPolicy: IfNotPresent
          command: ["/opt/kafka/bin/kafka-server-start.sh"]
          args: ["/config/server.properties"]
          ports:
            - name: internal
              containerPort: 9092
              protocol: TCP
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xms2g -Xmx2g"
            - name: LOG_DIR
              value: /tmp/kafka-logs
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          startupProbe:
            tcpSocket:
              port: internal
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket:
              port: internal
            initialDelaySeconds: 60
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["/bin/bash", "-ec", "sleep 30"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: kafka-config
              mountPath: /config
              readOnly: true
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-template
          configMap:
            name: kafka-server-config
        - name: kafka-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kafka
                    app.kubernetes.io/component: broker
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
