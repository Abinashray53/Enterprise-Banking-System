apiVersion: v1
kind: Service
metadata:
  name: loan-service
  namespace: banking
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
  labels:
    app: loan-service
spec:
  type: ClusterIP
  selector:
    app: loan-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
