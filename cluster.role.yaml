apiVersion: rbac.authorization.k8s.io/v1

kind: ClusterRole

metadata:
  name: ingress-nginx

rules:

- apiGroups: [""]

  resources:
    - configmaps
    - endpoints
    - nodes
    - pods
    - secrets
    - services

  verbs:
    - get
    - list
    - watch

- apiGroups:
    - networking.k8s.io

  resources:
    - ingresses
    - ingressclasses

  verbs:
    - get
    - list
    - watch

- apiGroups:
    - ""

  resources:
    - events

  verbs:
    - create
    - patch

- apiGroups:
    - coordination.k8s.io

  resources:
    - leases

  verbs:
    - create
    - get
    - update
    