version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: postgres

    restart: always

    environment:

      POSTGRES_DB: bankingdb

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

    ports:

      - "5432:5432"

    volumes:

      - postgres-data:/var/lib/postgresql/data

    networks:

      - banking-network

  redis:

    image: redis:7

    container_name: redis

    restart: always

    ports:

      - "6379:6379"

    networks:

      - banking-network

volumes:
  postgres-data:

networks:
  banking-network:
