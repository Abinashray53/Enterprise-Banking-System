apiVersion: apps/v1
kind: Deployment

metadata:
  name: customer-service

  namespace: enterprise-banking

  labels:
    app: customer-service

spec:

  replicas: 2

  revisionHistoryLimit: 10

  selector:
    matchLabels:
      app: customer-service

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:

    metadata:

      labels:
        app: customer-service

    spec:

      serviceAccountName: customer-service-account

      containers:

        - name: customer-service

          image: enterprisebank/customer-service:1.0.0

          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 8081

          envFrom:

            - configMapRef:
                name: customer-service-config

            - secretRef:
                name: banking-secret

          resources:

            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
              