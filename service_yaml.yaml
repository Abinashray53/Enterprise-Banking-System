apiVersion: v1
kind: Service

metadata:
  name: fraud-service
  namespace: banking

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"

  labels:
    app: fraud-service

spec:

  selector:
    app: fraud-service

  ports:

  - name: http

    port: 80

    targetPort: 8080

    protocol: TCP

  type: ClusterIP
  
