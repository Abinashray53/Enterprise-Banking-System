apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service
  namespace: banking

  labels:
    app: payment-service
    tier: backend
    version: v1

spec:
  replicas: 3

  revisionHistoryLimit: 10

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: payment-service

  template:

    metadata:

      labels:
        app: payment-service
        tier: backend
        version: v1

    spec:

      serviceAccountName: payment-service-account

      terminationGracePeriodSeconds: 30

      containers:

        - name: payment-service

          image: your-dockerhub/payment-service:latest

          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 8080
              name: http

          envFrom:

            - configMapRef:
                name: payment-service-config

            - secretRef:
                name: payment-service-secret

          env:

            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes

            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m"

          resources:

            requests:
              cpu: "500m"
              memory: "512Mi"

            limits:
              cpu: "1"
              memory: "1Gi"

          readinessProbe:

            httpGet:
              path: /actuator/health/readiness
              port: 8080

            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:

            httpGet:
              path: /actuator/health/liveness
              port: 8080

            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:

            httpGet:
              path: /actuator/health
              port: 8080

            failureThreshold: 30
            periodSeconds: 10

          securityContext:

            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

            capabilities:
              drop:
                - ALL

            runAsNonRoot: true
            runAsUser: 1000

          volumeMounts:

            - name: tmp-volume
              mountPath: /tmp

      volumes:

        - name: tmp-volume
          emptyDir: {}

      affinity:

        podAntiAffinity:

          preferredDuringSchedulingIgnoredDuringExecution:

            - weight: 100

              podAffinityTerm:

                topologyKey: kubernetes.io/hostname

                labelSelector:

                  matchExpressions:

                    - key: app

                      operator: In

                      values:

                        - payment-service
                        